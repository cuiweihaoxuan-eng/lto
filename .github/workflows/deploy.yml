name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --allow-build=esbuild

      - name: Build
        run: pnpm build

      - name: Copy PRD files
        run: |
          mkdir -p dist/prd/_routes
          cp -r prd/_routes/*.md dist/prd/_routes/ 2>/dev/null || true
          cp -r .prd/_routes/*.md dist/prd/_routes/ 2>/dev/null || true
          cp prd/prd-inject.js dist/ 2>/dev/null || true
          cp prd/prd.html dist/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4